name: CI Build
on:
  push:
    branches-ignore:
      # This build should run on all pushes EXCEPT main and snapshot branches.
      - main
      - snapshot
  pull_request:
    # This build should run for all pull requests.
    branches:
    - '*' # Run on all branches for pull requests.

env:
  LC_ALL: en_US.UTF-8
  GRADLE_OPTS: >-
    -Dorg.gradle.parallel=true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Gradle Build (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [21, 25]
      fail-fast: false
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        cache: "gradle"
        java-version: ${{ matrix.java-version }}
    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
    - name: Gradle version
      run: ./gradlew --no-daemon --version
    - name: Build with Gradle
      run: ./gradlew build --info
    - name: Run Performance Tests
      run: ./gradlew perfTest --info
